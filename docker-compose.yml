services:
  api:
    build: .
    image: review-analyzer:latest
    environment:
      ENVIRONMENT: docker
      SPACY_MODEL: en_core_web_sm
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  dashboard:
    build: .
    image: review-analyzer:latest
    command: ["streamlit", "run", "src/review_analyzer/dashboard/app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    environment:
      ENVIRONMENT: docker
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
